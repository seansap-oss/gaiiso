<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GAAISO Admin Studio</title>
  <meta name="robots" content="noindex,nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="admin.css">
</head>
<body>
  <section class="login-screen" id="loginScreen">
    <div class="login-card">
      <div class="logo-row"><div class="ornament">✦</div><div><h1>GAAISO</h1><span>Admin Studio</span></div></div>
      <h2>Owner Login</h2>
      <p>Enter the admin password to open the website control panel.</p>
      <form id="loginForm" class="login-form">
        <input id="adminPassword" type="password" placeholder="Admin password" autocomplete="current-password">
        <button type="submit">Login</button>
      </form>
      <small>Route: <strong>/admin</strong></small>
    </div>
  </section>

  <main class="studio hidden" id="adminStudio">
    <aside class="sidebar">
      <div class="brand-block">
        <div class="brand-icon">✥</div>
        <div><strong>GAAISO</strong><span>Admin Studio</span></div>
      </div>
      <div class="profile-card"><div class="avatar">SA</div><div><b>Sony Admin</b><span>Super Admin</span><em>● Online</em></div></div>
      <nav class="side-nav">
        <button class="active" data-tab="dashboard">⌂ Dashboard</button>
        <button data-tab="homepage">✎ Homepage Editor</button>
        <button data-tab="hero">▧ Hero Media</button>
        <button data-tab="gallery">▧ Gallery Manager</button>
        <button data-tab="shop">▢ Shop Manager</button>
        <button data-tab="design">◉ Design & Branding</button>
        <button data-tab="guestbook">▥ Guest Book</button>
        <button data-tab="backup">☁ Backup & Restore</button>
        <button id="logoutBtn">↪ Logout</button>
      </nav>
      <div class="status-card"><b>Website Status</b><span><i></i> Live</span><small id="lastSaved">Last saved: not yet</small><a href="../index.html" target="_blank">View Site ↗</a></div>
    </aside>

    <section class="workspace">
      <header class="topbar">
        <button id="menuToggle" class="hamb">☰</button>
        <div class="welcome">Welcome back, <b>Sony Admin</b> <span>Super Admin</span></div>
        <div class="top-actions"><a href="../index.html" target="_blank">◉ Preview Website ↗</a><div class="mini-avatar">SA</div><b>Sony Admin⌄</b></div>
      </header>

      <div class="tabs-strip">
        <button class="active" data-tab="homepage">✎ Homepage Editor</button>
        <button data-tab="hero">▧ Hero Media</button>
        <button data-tab="gallery">▧ Gallery Manager</button>
        <button data-tab="shop">▢ Shop Manager</button>
        <button data-tab="design">◉ Design & Branding</button>
        <button data-tab="guestbook">▥ Guest Book</button>
      </div>

      <section class="tab-page active" id="tab-dashboard">
        <div class="dashboard-grid">
          <section class="panel editor-panel" data-jump="homepage"></section>
          <section class="panel hero-panel" data-jump="hero"></section>
          <section class="panel preview-panel"></section>
          <section class="panel gallery-panel small-panel" data-jump="gallery"></section>
          <section class="panel shop-panel small-panel" data-jump="shop"></section>
          <section class="panel guest-panel small-panel" data-jump="guestbook"></section>
        </div>
      </section>

      <section class="tab-page" id="tab-homepage">
        <div class="two-col">
          <section class="panel editor-panel full-editor"></section>
          <section class="panel preview-panel sticky-preview"></section>
        </div>
      </section>

      <section class="tab-page" id="tab-hero">
        <div class="two-col">
          <section class="panel hero-panel full-editor"></section>
          <section class="panel preview-panel sticky-preview"></section>
        </div>
      </section>

      <section class="tab-page" id="tab-gallery">
        <section class="panel gallery-full-panel"></section>
      </section>

      <section class="tab-page" id="tab-shop">
        <section class="panel shop-full-panel"></section>
      </section>

      <section class="tab-page" id="tab-design">
        <div class="two-col">
          <section class="panel design-panel full-editor"></section>
          <section class="panel preview-panel sticky-preview"></section>
        </div>
      </section>

      <section class="tab-page" id="tab-guestbook">
        <section class="panel guest-full-panel"></section>
      </section>

      <section class="tab-page" id="tab-backup">
        <section class="panel backup-panel"></section>
      </section>
    </section>
  </main>

  <div class="toast" id="toast"></div>
  <div class="modal" id="videoPreviewModal"><div class="modal-card"><button class="modal-close">×</button><video controls playsinline></video></div></div>
  <script src="../cms-data.js"></script>
  <script src="admin.js"></script>
</body>
</html>
